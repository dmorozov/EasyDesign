<!-- @dsCard group="Components" viewport="700x420" name="Buttons, Badges & Cards" subtitle="Core actions and surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:22px;background:var(--app-bg);}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .grp{margin-bottom:18px;}
  .lbl{font-size:var(--fs-micro);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;}
  .cards{display:flex;gap:12px;}
  .cards .eds-card{width:150px;}
  .ct{font-size:13px;color:var(--text-body);}
  .ch{font-weight:600;color:var(--text-ink);font-size:14px;margin-bottom:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Card } = window.EasyDesignDesignSystem_95eb6c;
const Ico = ({d}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const Plus = () => <Ico d="M12 5v14M5 12h14"/>;
const Undo = () => <Ico d="M9 14L4 9l5-5M4 9h11a5 5 0 0 1 0 10h-1"/>;
const Code = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>;

function Demo(){
  return (
    <div>
      <div className="grp">
        <div className="lbl">Buttons</div>
        <div className="row">
          <Button variant="primary" icon={<Code/>}>Export Code</Button>
          <Button variant="secondary">Import</Button>
          <Button variant="ghost">Cancel</Button>
          <Button variant="soft" icon={<Plus/>}>New Frame</Button>
          <Button variant="danger">Reset</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
        <div className="row">
          <Button variant="secondary" size="sm">Small</Button>
          <Button variant="secondary" size="md">Medium</Button>
          <Button variant="secondary" size="lg">Large</Button>
        </div>
      </div>
      <div className="grp">
        <div className="lbl">Icon buttons</div>
        <div className="row">
          <IconButton aria-label="Undo"><Undo/></IconButton>
          <IconButton aria-label="Add" active><Plus/></IconButton>
          <IconButton aria-label="Add" bordered><Plus/></IconButton>
          <IconButton aria-label="Add" bordered size="lg"><Plus/></IconButton>
        </div>
      </div>
      <div className="grp">
        <div className="lbl">Badges</div>
        <div className="row">
          <Badge tone="success" dot>Saved</Badge>
          <Badge tone="warning" dot>Saving…</Badge>
          <Badge tone="accent">Web</Badge>
          <Badge tone="outline">Email</Badge>
          <Badge tone="neutral">Draft v1.0</Badge>
          <Badge tone="danger">Locked</Badge>
        </div>
      </div>
      <div className="grp">
        <div className="lbl">Cards</div>
        <div className="cards">
          <Card pad="md"><div className="ch">Default</div><div className="ct">Border + soft shadow</div></Card>
          <Card variant="sunken" pad="md"><div className="ch">Sunken</div><div className="ct">Tinted, flush</div></Card>
          <Card pad="md" interactive selected><div className="ch">Selected</div><div className="ct">Accent ring</div></Card>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
