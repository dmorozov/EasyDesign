<!-- @dsCard group="Components" viewport="700x520" name="Editor Building Blocks" subtitle="Tabs, panels, swatches, palette items" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;padding:22px;background:var(--app-bg);}
  .wrap{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;}
  .lbl{font-size:var(--fs-micro);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-muted);margin:0 0 10px;}
  .panel{background:var(--surface);border:var(--border-w) solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;}
  .pal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .pal-rows{display:flex;flex-direction:column;gap:10px;}
  .sw{display:flex;flex-direction:column;gap:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.EasyDesignDesignSystem_95eb6c;
const { Tabs, PanelSection, PanelHeader, Swatch, PaletteItem, Input, Select, SegmentedControl } = NS;
const I = ({d,f}) => <svg viewBox="0 0 24 24" fill={f||"none"} stroke={f?"none":"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const Stack = () => <I d="M4 5h16M4 12h16M4 19h16"/>;
const Grid = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg>;
const Heading = () => <I d="M6 4v16M18 4v16M6 12h12"/>;
const Btn = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="8" width="18" height="8" rx="2"/></svg>;

function Demo(){
  const [tab,setTab] = React.useState('inspector');
  const [grp,setGrp] = React.useState('layout');
  const [theme,setTheme] = React.useState({primary:'#4648d4',bg:'#ffffff',text:'#161b27'});
  return (
    <div className="wrap">
      <div>
        <div className="lbl">Component palette</div>
        <Tabs variant="pill" value={grp} onChange={setGrp} tabs={['Layout','Content','Assets'].map(s=>({value:s.toLowerCase(),label:s}))} />
        <div style={{height:14}} />
        <div className="pal-grid">
          <PaletteItem layout="card" icon={<Stack/>} label="Stack" />
          <PaletteItem layout="card" icon={<Grid/>} label="Grid" disabled disabledNote="Not available in email" />
        </div>
        <div className="pal-rows">
          <PaletteItem icon={<Heading/>} label="Heading" />
          <PaletteItem icon={<Btn/>} label="Primary Button" dragging />
        </div>
      </div>
      <div>
        <div className="lbl">Right rail</div>
        <div className="panel">
          <PanelHeader title="Properties" subtitle="Primary Button" />
          <Tabs value={tab} onChange={setTab} tabs={[{value:'inspector',label:'Inspector'},{value:'design',label:'Design'},{value:'export',label:'Export'}]} />
          <PanelSection title="Size & Position" defaultOpen>
            <div style={{display:'flex',gap:12}}>
              <Input label="Width" defaultValue="320" trail={<span style={{fontSize:12,color:'var(--text-muted)'}}>px</span>} size="sm" />
              <Input label="Height" defaultValue="Auto" size="sm" />
            </div>
          </PanelSection>
          <PanelSection title="Design Palette (Theme)" defaultOpen>
            <div className="sw">
              <Swatch name="Primary" value={theme.primary} onChange={v=>setTheme({...theme,primary:v})} />
              <Swatch name="Background" value={theme.bg} onChange={v=>setTheme({...theme,bg:v})} />
              <Swatch name="Text" value={theme.text} onChange={v=>setTheme({...theme,text:v})} />
            </div>
          </PanelSection>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
