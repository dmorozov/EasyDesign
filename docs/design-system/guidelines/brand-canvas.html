<!-- @dsCard group="Brand" viewport="700x230" name="Canvas, Frame & Drop Indicators" subtitle="Dot-grid board · floating frame · accent drop line." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);}
  .canvas{height:230px;padding:24px;box-sizing:border-box;display:flex;gap:20px;align-items:center;justify-content:center;}
  .frame{width:230px;background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-frame);overflow:hidden;}
  .fhead{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border-faint);}
  .ficon{color:var(--text-faint);display:flex;}
  .fname{font-size:12px;font-weight:600;color:var(--text-body);}
  .fbody{padding:14px;}
  .blk{height:14px;border-radius:5px;background:var(--slate-150);margin-bottom:9px;}
  .blk.s{width:60%;}
  /* drop indicator */
  .drop{position:relative;}
  .dropline{height:3px;background:var(--drop-indicator);border-radius:3px;position:relative;margin:4px 0;}
  .dropline::before{content:"";position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:var(--drop-indicator);}
  .inside{border:2px solid var(--drop-indicator);background:var(--drop-inside);border-radius:var(--radius-md);padding:10px;}
  .empty{border:1.5px dashed var(--border-strong);border-radius:var(--radius-md);padding:18px;text-align:center;color:var(--text-muted);font-size:12px;}
</style></head>
<body>
<div class="canvas eds-dotgrid">
  <div class="frame">
    <div class="fhead"><span class="ficon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/></svg></span><span class="fname">Landing Header</span></div>
    <div class="fbody">
      <div class="blk"></div>
      <div class="dropline"></div>
      <div class="blk s"></div>
      <div class="inside" style="margin-top:9px"><div class="blk" style="margin:0;background:var(--accent-soft-2)"></div></div>
    </div>
  </div>
  <div class="frame">
    <div class="fhead"><span class="ficon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/></svg></span><span class="fname">New Frame</span></div>
    <div class="fbody"><div class="empty">Drag a component here to start</div></div>
  </div>
</div>
</body></html>
