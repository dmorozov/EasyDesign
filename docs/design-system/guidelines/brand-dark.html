<!-- @dsCard group="Brand" viewport="700x250" name="Light & Dark Chrome" subtitle="Same chrome, two skins. Toggle data-theme=\"dark\"." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;}
  .pane{background:var(--app-bg);padding:18px;}
  .cap{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-faint);margin-bottom:12px;}
  .bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 10px;margin-bottom:12px;}
  .wm{font-size:15px;font-weight:800;letter-spacing:-.02em;color:var(--text-ink);}
  .wm .d{color:var(--accent);}
  .spacer{flex:1;}
  .btn{height:26px;padding:0 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;display:inline-flex;align-items:center;border:none;}
  .btn.primary{background:var(--accent);color:var(--on-accent);}
  .btn.ghost{background:transparent;color:var(--text-muted);}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--shadow-sm);}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:9px;}
  .swatch{display:flex;align-items:center;gap:10px;padding:6px;border-radius:var(--radius-sm);}
  .swatch.sel{background:var(--accent-soft);}
  .chip{width:22px;height:22px;border-radius:5px;box-shadow:inset 0 0 0 1px rgba(127,127,127,.25);}
  .nm{font-size:13px;font-weight:500;color:var(--text-ink);}
  .hex{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .input{height:30px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);color:var(--text-ink);font-size:13px;padding:0 10px;display:flex;align-items:center;margin-top:8px;}
</style></head>
<body>
<div class="pane" id="light">
  <div class="cap">Light</div>
  <div class="bar"><span class="wm">Easy<span class="d">Design</span></span><span class="spacer"></span><span class="btn ghost">Import</span><span class="btn primary">Export</span></div>
  <div class="panel">
    <div class="lbl">Design Palette</div>
    <div class="swatch sel"><span class="chip" style="background:#4648d4"></span><span class="nm">Primary</span><span class="hex">#4648D4</span></div>
    <div class="swatch"><span class="chip" style="background:#fff"></span><span class="nm">Background</span><span class="hex">#FFFFFF</span></div>
    <div class="input">Get Started</div>
  </div>
</div>
<div class="pane" id="dark" data-theme="dark">
  <div class="cap">Dark</div>
  <div class="bar"><span class="wm">Easy<span class="d">Design</span></span><span class="spacer"></span><span class="btn ghost">Import</span><span class="btn primary">Export</span></div>
  <div class="panel">
    <div class="lbl">Design Palette</div>
    <div class="swatch sel"><span class="chip" style="background:#4648d4"></span><span class="nm">Primary</span><span class="hex">#4648D4</span></div>
    <div class="swatch"><span class="chip" style="background:#fff"></span><span class="nm">Background</span><span class="hex">#FFFFFF</span></div>
    <div class="input">Get Started</div>
  </div>
</div>
</body></html>
