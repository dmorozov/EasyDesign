<!-- @dsCard group="Brand" viewport="700x270" name="Selection — Frame vs Element" subtitle="Frame: accent ring + name tag. Element: outline + handle." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);}
  .canvas{padding:36px 28px 24px;display:flex;gap:30px;align-items:flex-start;justify-content:center;}
  .wrap{position:relative;}
  .tag{position:absolute;top:-24px;left:0;display:inline-flex;align-items:center;gap:5px;height:20px;padding:0 8px;background:var(--selection);color:#fff;border-radius:var(--radius-sm);font-size:11px;font-weight:600;box-shadow:var(--shadow-sm);white-space:nowrap;}
  .tag svg{width:12px;height:12px;}
  .frame{width:250px;background:var(--surface);border-radius:var(--radius-xl);box-shadow:var(--shadow-frame);border:1px solid var(--border-faint);overflow:hidden;}
  .frame.sel{box-shadow:var(--shadow-frame),0 0 0 2px var(--selection);}
  .fhead{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border-faint);}
  .fhead.on{background:var(--accent-soft);}
  .ficon{color:var(--text-faint);display:flex;} .fhead.on .ficon{color:var(--accent-press);}
  .fname{font-size:12px;font-weight:600;color:var(--text-ink);}
  .fbody{padding:16px;display:flex;flex-direction:column;gap:12px;}
  .h{font-size:18px;font-weight:700;color:#161b27;margin:0;line-height:1.15;}
  .p{font-size:12px;color:#5b6475;margin:0;line-height:1.5;}
  .node{position:relative;border-radius:4px;}
  .node.sel{outline:2px solid var(--selection);outline-offset:3px;}
  .ntag{position:absolute;top:-11px;left:-2px;height:18px;padding:0 6px;display:inline-flex;align-items:center;gap:4px;background:var(--selection);color:#fff;border-radius:var(--radius-sm);font-size:10px;font-weight:600;box-shadow:var(--shadow-sm);}
  .ntag svg{width:11px;height:11px;}
  .btn{align-self:flex-start;background:#4648d4;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:600;font-size:13px;}
  .lab{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-faint);text-align:center;margin-top:14px;}
</style></head>
<body>
<div class="canvas eds-dotgrid">
  <div>
    <div class="wrap">
      <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/></svg>Landing Header</span>
      <div class="frame sel">
        <div class="fhead on"><span class="ficon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/></svg></span><span class="fname">Landing Header</span></div>
        <div class="fbody"><h1 class="h">Design the future.</h1><p class="p">Build beautiful interfaces with ease.</p><button class="btn">Get Started</button></div>
      </div>
    </div>
    <div class="lab">Frame selected</div>
  </div>

  <div>
    <div class="frame">
      <div class="fhead"><span class="ficon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/></svg></span><span class="fname">Landing Header</span></div>
      <div class="fbody">
        <h1 class="h">Design the future.</h1>
        <div class="node sel"><span class="ntag"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"/><circle cx="15" cy="6" r="1.6"/><circle cx="9" cy="12" r="1.6"/><circle cx="15" cy="12" r="1.6"/><circle cx="9" cy="18" r="1.6"/><circle cx="15" cy="18" r="1.6"/></svg>Text</span><p class="p" style="margin:0">Build beautiful interfaces with ease.</p></div>
        <button class="btn">Get Started</button>
      </div>
    </div>
    <div class="lab">Element selected</div>
  </div>
</div>
</body></html>
