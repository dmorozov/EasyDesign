<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--icon-strong);}
  .ic svg{width:22px;height:22px;}
  .ic span{font-size:9.5px;color:var(--text-muted);}
</style></head>
<body>
<div class="grid" id="g"></div>
<script>
  const sw='fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  const icons={
    Undo:'<path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/>',
    Redo:'<path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h1"/>',
    Search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>',
    Stack:'<path d="M4 6h16M4 12h16M4 18h16"/>',
    Grid:'<rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/>',
    Heading:'<path d="M6 4v16M18 4v16M6 12h12"/>',
    Text:'<path d="M4 6h16M4 12h16M4 18h10"/>',
    Image:'<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="m21 16-5-5L5 20"/>',
    Code:'<path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/>',
    Layers:'<path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/>',
    Settings:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M5 12H2M22 12h-3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
    Folder:'<path d="M4 5h5l2 2h9v11H4z"/>',
    Copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/>',
    Download:'<path d="M12 3v12M7 11l5 5 5-5M5 21h14"/>',
    Plus:'<path d="M12 5v14M5 12h14"/>',
    Trash:'<path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/>',
    Hand:'<path d="M9 11V5a1.5 1.5 0 0 1 3 0v6M12 11V4a1.5 1.5 0 0 1 3 0v7M15 11V6a1.5 1.5 0 0 1 3 0v9a6 6 0 0 1-6 6h-1a6 6 0 0 1-5-3l-2.5-4a1.5 1.5 0 0 1 2.5-1.6L9 13"/>',
    Check:'<path d="M5 12l5 5L20 7"/>'
  };
  document.getElementById('g').innerHTML=Object.entries(icons).map(([n,p])=>
    `<div class="ic"><svg viewBox="0 0 24 24" ${sw}>${p}</svg><span>${n}</span></div>`).join('');
</script>
</body></html>
