<!-- @dsCard group="Colors" viewport="700x150" name="Code View Palette" subtitle="Dark export block — syntax colors." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-mono);}
  .block{background:var(--code-bg);border-radius:var(--radius-md);padding:16px 18px;font-size:13px;line-height:1.7;}
  .dim{color:var(--code-dim);}
  .key{color:var(--code-key);}
  .str{color:var(--code-str);}
  .tag{color:var(--code-tag);}
  .num{color:var(--code-num);}
  .fg{color:var(--code-fg);}
</style></head>
<body>
<div class="block">
<span class="dim">// Your design, as real code</span><br/>
<span class="key">export function</span> <span class="tag">Hero</span><span class="fg">() {</span><br/>
<span class="fg">&nbsp;&nbsp;</span><span class="key">return</span> <span class="fg">&lt;</span><span class="tag">button</span> <span class="str">className</span><span class="fg">=</span><span class="str">"btn"</span> <span class="str">radius</span><span class="fg">=</span><span class="num">8</span><span class="fg">&gt;Get Started&lt;/</span><span class="tag">button</span><span class="fg">&gt;;</span><br/>
<span class="fg">}</span>
</div>
</body></html>
