<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Indigo" subtitle="The single confident accent. 500 is primary." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .scale{display:flex;gap:8px;}
  .sw{flex:1;}
  .chip{height:60px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(22,27,39,.06);}
  .nm{font-size:11px;font-weight:600;color:var(--text-body);margin-top:7px;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;}
  .star{position:absolute;color:#fff;font-size:13px;margin:8px 0 0 8px;}
</style></head>
<body>
<div class="scale" id="s"></div>
<script>
  const steps=[['50','--indigo-50'],['100','--indigo-100'],['200','--indigo-200'],['300','--indigo-300'],['400','--indigo-400'],['500','--indigo-500'],['600','--indigo-600'],['700','--indigo-700'],['800','--indigo-800'],['900','--indigo-900']];
  const cs=getComputedStyle(document.documentElement);
  document.getElementById('s').innerHTML=steps.map(([n,v])=>{
    const hex=cs.getPropertyValue(v).trim();
    return `<div class="sw"><div class="chip" style="background:${hex}">${n==='500'?'<div class="star">\u2605</div>':''}</div><div class="nm">${n}</div><div class="hex">${hex}</div></div>`;
  }).join('');
</script>
</body></html>
