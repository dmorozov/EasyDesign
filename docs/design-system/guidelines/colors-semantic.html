<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Feedback" subtitle="Saved, saving, destructive. Soft tint + solid." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .item{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
  .solid{height:44px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:600;font-size:13px;}
  .soft{height:34px;display:flex;align-items:center;padding:0 12px;font-weight:600;font-size:12px;}
  .hex{font-family:var(--font-mono);font-size:10px;opacity:.85;margin-left:auto;font-weight:500;}
</style></head>
<body>
<div class="row">
  <div class="item"><div class="solid" style="background:var(--success)">Saved<span class="hex">#1F9D57</span></div><div class="soft" style="background:var(--success-soft);color:var(--success)">success-soft</div></div>
  <div class="item"><div class="solid" style="background:var(--warning)">Saving\u2026<span class="hex">#D98A1A</span></div><div class="soft" style="background:var(--warning-soft);color:var(--warning)">warning-soft</div></div>
  <div class="item"><div class="solid" style="background:var(--danger)">Reset<span class="hex">#D94545</span></div><div class="soft" style="background:var(--danger-soft);color:var(--danger)">danger-soft</div></div>
</div>
</body></html>
