<!-- @dsCard group="Colors" viewport="700x150" name="Neutral — Slate" subtitle="Cool-gray chrome. Surfaces, borders, text." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:20px;background:var(--surface);font-family:var(--font-sans);}
  .scale{display:flex;gap:6px;}
  .sw{flex:1;}
  .chip{height:60px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(22,27,39,.08);}
  .nm{font-size:10px;font-weight:600;color:var(--text-body);margin-top:7px;}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;}
</style></head>
<body>
<div class="scale" id="s"></div>
<script>
  const steps=[['0','--slate-0'],['25','--slate-25'],['50','--slate-50'],['100','--slate-100'],['150','--slate-150'],['200','--slate-200'],['300','--slate-300'],['400','--slate-400'],['500','--slate-500'],['600','--slate-600'],['700','--slate-700'],['800','--slate-800'],['900','--slate-900']];
  const cs=getComputedStyle(document.documentElement);
  document.getElementById('s').innerHTML=steps.map(([n,v])=>{
    const hex=cs.getPropertyValue(v).trim();
    return `<div class="sw"><div class="chip" style="background:${hex}"></div><div class="nm">${n}</div><div class="hex">${hex}</div></div>`;
  }).join('');
</script>
</body></html>
