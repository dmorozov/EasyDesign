<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, cool-tinted shadows. Flat material." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:28px 22px;background:var(--surface-sunken);font-family:var(--font-sans);}
  .row{display:flex;gap:22px;}
  .col{text-align:center;}
  .box{width:84px;height:60px;background:var(--surface);border-radius:var(--radius-lg);}
  .n{font-size:11px;font-weight:600;color:var(--text-body);margin-top:12px;}
  .v{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-frame)"></div><div class="n">frame</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lift)"></div><div class="n">lift (drag)</div></div>
</div>
</body></html>
