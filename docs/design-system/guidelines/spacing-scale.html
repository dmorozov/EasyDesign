<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-sans);}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--accent);border-radius:3px;width:18px;}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
  .n{font-size:11px;font-weight:600;color:var(--text-body);}
</style></head>
<body>
<div class="row" id="r"></div>
<script>
  const steps=[['2','--space-1'],['4','--space-2'],['8','--space-4'],['12','--space-6'],['16','--space-8'],['24','--space-12'],['32','--space-16'],['40','--space-20'],['48','--space-24']];
  const cs=getComputedStyle(document.documentElement);
  document.getElementById('r').innerHTML=steps.map(([n,v])=>{
    const px=cs.getPropertyValue(v).trim();
    return `<div class="col"><div class="bar" style="height:${px}"></div><div class="n">${n}</div><div class="v">${v.replace('--space-','sp-')}</div></div>`;
  }).join('');
</script>
</body></html>
