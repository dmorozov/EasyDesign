<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-sans);color:var(--text-ink);}
  .fam{margin-bottom:20px;}
  .meta{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
  .big{font-size:34px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;}
  .big.mono{font-family:var(--font-mono);font-weight:500;}
  .gly{font-size:14px;color:var(--text-muted);margin-top:6px;}
</style></head>
<body>
  <div class="fam">
    <div class="meta">Inter · UI sans · all chrome</div>
    <div class="big">Drag, drop, design.</div>
    <div class="gly">ABCDEFGHIJKLM abcdefghijklm 0123456789 — 400 / 500 / 600 / 700 / 800</div>
  </div>
  <div class="fam">
    <div class="meta">JetBrains Mono · code &amp; export only</div>
    <div class="big mono">export function() {}</div>
    <div class="gly" style="font-family:var(--font-mono)">{ } &lt;/&gt; 0123456789 — 400 / 500 / 600</div>
  </div>
</body></html>
