<!-- @dsCard group="Type" viewport="700x320" name="Type Scale" subtitle="Compact, legible chrome scale (px)." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface);font-family:var(--font-sans);color:var(--text-ink);}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-faint);}
  .r:last-child{border-bottom:none;}
  .tok{flex:none;width:170px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .spec{line-height:1.15;color:var(--text-ink);}
</style></head>
<body>
  <div class="r"><span class="tok">--fs-2xl · 24/700</span><span class="spec" style="font-size:24px;font-weight:700;letter-spacing:-.01em">App heading</span></div>
  <div class="r"><span class="tok">--fs-xl · 20/700</span><span class="spec" style="font-size:20px;font-weight:700">Section title</span></div>
  <div class="r"><span class="tok">--fs-lg · 17/700</span><span class="spec" style="font-size:17px;font-weight:700">Panel title</span></div>
  <div class="r"><span class="tok">--fs-md · 15/500</span><span class="spec" style="font-size:15px;font-weight:500">Emphasized body</span></div>
  <div class="r"><span class="tok">--fs-base · 14/400</span><span class="spec" style="font-size:14px">Default body &amp; inputs</span></div>
  <div class="r"><span class="tok">--fs-sm · 13/500</span><span class="spec" style="font-size:13px;font-weight:500">Dense control text</span></div>
  <div class="r"><span class="tok">--fs-caption · 12/400</span><span class="spec" style="font-size:12px;color:var(--text-muted)">Helper / field caption</span></div>
  <div class="r"><span class="tok">--fs-micro · 11/600</span><span class="spec" style="font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted)">Section label</span></div>
</body></html>
